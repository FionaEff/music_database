{% extends "base.html" %} {% block content %}
<h2>Artists</h2>
<table class="table table-hover">
  <thead>
    <tr>
      <th>Name</th>
      <th>Country</th>
      <th>Founded</th>
    </tr>
  </thead>

  <tbody>
    {% for artist in artists %}
    <tr class="position-relative">
      <td>{{ artist.name }}</td>
      <td>{{ artist.country or "-" }}</td>
      <td>{{ artist.year_of_founding or "-" }}</td>
      <td>
        <a
          href="{{ url_for('main.artist_details', artist_id=artist.id) }}"
          class="stretched-link"
        ></a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
